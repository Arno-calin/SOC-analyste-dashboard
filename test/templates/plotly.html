<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Exemple Plotly</title>
    <!-- Inclusion de la librairie Plotly depuis un CDN -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  </head>
  <body>
    <h2>Graphique interactif avec Plotly</h2>

    <!-- Div pour contenir le graphique -->
    <div id="myPlot" style="width: 80%; height: 500px"></div>

    <script>
      // Données pour le graphique
      var trace1 = {
        x: [1, 2, 3, 4, 5],
        y: [10, 15, 13, 17, 22],
        mode: "lines+markers",
        type: "scatter",
        name: "Série 1",
      };

      var trace2 = {
        x: [1, 2, 3, 4, 5],
        y: [16, 5, 11, 9, 15],
        mode: "lines+markers",
        type: "scatter",
        name: "Série 2",
      };

      var data = [trace1, trace2];

      // Options de mise en page
      var layout = {
        title: "Exemple de graphique Plotly",
        xaxis: { title: "X Axis" },
        yaxis: { title: "Y Axis" },
      };

      // Création du graphique
      Plotly.newPlot("myPlot", data, layout);
    </script>
  </body>
</html>
